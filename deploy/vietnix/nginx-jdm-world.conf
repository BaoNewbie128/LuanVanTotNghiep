server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    root /var/www/jdm-world/frontend/dist;
    index index.html;
    client_max_body_size 12M;

    location ^~ /storage/ {
        alias /var/www/jdm-world/backend/storage/app/public/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /api/ {
        try_files $uri @laravel;
    }

    location = /up {
        try_files $uri @laravel;
    }

    location @laravel {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/jdm-world/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/jdm-world/backend/public;
        fastcgi_param HTTPS $https;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 120;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
